name: flutter_skill_gen
description: >-
  A CLI tool that automatically generates SKILL.md files for Flutter projects,
  giving AI coding assistants full project context from the first prompt.
version: 0.1.0
homepage: https://github.com/donaldamadi/flutter_skill_gen
repository: https://github.com/donaldamadi/flutter_skill_gen

environment:
  sdk: ^3.8.0

dependencies:
  args: ^2.6.0
  glob: ^2.1.0
  http: ^1.3.0
  json_annotation: ^4.11.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.9.0
  lints: ^5.1.0
  test: ^1.25.0

executables:
  flutter_skill_gen: flutter_skill_gen
