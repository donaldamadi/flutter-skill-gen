name: sample_bloc_app
description: A sample Flutter app using Clean Architecture and BLoC.
version: 1.0.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  go_router: ^14.0.0
  get_it: ^8.0.0
  injectable: ^2.5.0
  dio: ^5.7.0
  retrofit: ^4.4.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.0
  dartz: ^0.10.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  retrofit_generator: ^9.1.0
  hive_generator: ^2.0.0
